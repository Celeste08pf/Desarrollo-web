<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink: #361d3f;
    --parchment: #d7d4bd;
    --parchment-2: #1c180c;
    --brass: #dc8b4a;
    --rust: #831e03;
    --gray: #483405;
    --paper-line: rgba(28,37,65,0.14);
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background: var(--ink);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(164,113,72,0.18), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(181,72,43,0.12), transparent 45%);
    font-family: 'IBM Plex Sans', sans-serif;
    padding: 32px;
  }

  .card{
    position: relative;
    width: 100%;
    max-width: 420px;
    background: var(--parchment);
    border-radius: 4px;
    padding: 48px 44px 40px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.55), 0 0 0 1px rgba(0,0,0,0.05);
  }

  /* perforated edge, like a ledger card torn from a book */
  .card::before{
    content:"";
    position:absolute;
    left:0; right:0; top:0;
    height: 10px;
    background-image: radial-gradient(circle, var(--ink) 2.5px, transparent 2.6px);
    background-size: 18px 18px;
    background-position: 9px -9px;
    background-repeat: repeat-x;
  }

  .eyebrow{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--rust);
    margin: 0 0 10px;
  }

  h1{
    font-family: 'Libre Baskerville', serif;
    font-weight: 700;
    font-size: 30px;
    line-height: 1.15;
    color: var(--ink);
    margin: 0 0 6px;
  }

  .sub{
    color: var(--gray);
    font-size: 14px;
    margin: 0 0 32px;
  }

  form{
    display:flex;
    flex-direction: column;
    gap: 22px;
  }

  .field{
    position: relative;
  }

  label{
    display:block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.65;
    margin-bottom: 8px;
  }

  input[type="email"],
  input[type="password"]{
    width: 100%;
    border: none;
    border-bottom: 1.5px solid var(--paper-line);
    background: transparent;
    padding: 8px 2px 10px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 15.5px;
    color: var(--ink);
    outline: none;
    transition: border-color .2s ease;
  }

  input::placeholder{ color: rgba(28,37,65,0.35); }

  input[type="email"]:focus,
  input[type="password"]:focus{
    border-bottom-color: var(--rust);
  }

  input:focus-visible{
    outline: 2px solid var(--brass);
    outline-offset: 4px;
  }

  .row-between{
    display:flex;
    align-items:center;
    justify-content: space-between;
    font-size: 13px;
    color: var(--gray);
    margin-top: -6px;
  }

  .row-between a{
    color: var(--rust);
    text-decoration: none;
    font-weight: 600;
  }
  .row-between a:hover{ text-decoration: underline; }

  .remember{
    display:flex;
    align-items:center;
    gap: 8px;
  }

  .remember input{ accent-color: var(--rust); width:14px; height:14px; }

  button{
    margin-top: 8px;
    width: 100%;
    padding: 14px 20px;
    background: var(--ink);
    color: var(--parchment);
    border: none;
    border-radius: 2px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14.5px;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: background .2s ease, transform .1s ease;
  }

  button:hover{ background: #0f1730; }
  button:active{ transform: translateY(1px); }
  button:focus-visible{ outline: 2px solid var(--brass); outline-offset: 3px; }

  .divider{
    display:flex;
    align-items:center;
    gap: 12px;
    color: var(--gray);
    font-size: 12px;
    margin: 6px 0 2px;
  }
  .divider::before, .divider::after{
    content:"";
    flex:1;
    height:1px;
    background: var(--paper-line);
  }

  .footer-text{
    text-align:center;
    font-size: 13.5px;
    color: var(--gray);
    margin-top: 22px;
  }
  .footer-text a{ color: var(--ink); font-weight: 600; text-decoration: none; }
  .footer-text a:hover{ text-decoration: underline; }

  /* stamp signature element */
  .stamp{
    position: absolute;
    top: 32px;
    right: 34px;
    width: 58px;
    height: 58px;
    border: 1.5px solid var(--rust);
    border-radius: 50%;
    display:flex;
    align-items:center;
    justify-content:center;
    transform: rotate(-11deg);
    opacity: 0.85;
  }
  .stamp span{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--rust);
    text-align:center;
    line-height: 1.3;
  }

  @media (prefers-reduced-motion: reduce){
    button{ transition: none; }
  }

  @media (max-width: 480px){
    .card{ padding: 40px 26px 32px; }
    .stamp{ width: 46px; height: 46px; top: 24px; right: 22px; }
  }
</style>
</head>
<body>

  <div class="card">
    <div class="stamp"><span>Acceso<br>verificado</span></div>
    <p class="eyebrow">Cuenta</p>
    <h1>Inicia sesión</h1>
    <p class="sub">Ingresa tus datos para continuar en tu cuenta.</p>

    <form action="#" method="post">
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" placeholder="nombre@correo.com" required>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required minlength="8">
      </div>

      <div class="row-between">
        <span class="remember">
          <input type="checkbox" id="remember" name="remember">
          <label for="remember" style="margin:0; text-transform:none; font-family:'IBM Plex Sans',sans-serif; font-size:13px; opacity:1; color:var(--gray);">Recordarme</label>
        </span>
        <a href="#">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="submit">Entrar</button>
    </form>

    <p class="footer-text">¿No tienes cuenta? <a href="#">Regístrate aquí</a></p>
  </div>

</body>
</html>
